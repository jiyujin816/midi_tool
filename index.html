<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MIDI → 文字列変換</title>
</head>
<body>

<h2>MIDI → 文字列変換（最高音抽出）</h2>

<input type="file" id="file"><br><br>

<!-- EPS入力 -->
EPS: <input type="number" id="eps" value="0.02" step="0.01"><br><br>

<!-- 最大音数 -->
最大音数: <input type="number" id="limit" value="1000"><br><br>

<textarea id="output" rows="10" cols="80"></textarea>

<script type="module">
import { Midi } from "https://cdn.jsdelivr.net/npm/@tonejs/midi@2.0.27/+esm";

const input=document.getElementById("file");
const output=document.getElementById("output");
const epsInput=document.getElementById("eps");
const limitInput=document.getElementById("limit");

input.addEventListener("change",async(e)=>{
  const file=e.target.files[0];
  if(!file)return;

  const arrayBuffer=await file.arrayBuffer();
  const midi=new Midi(arrayBuffer);

  // デバッグ
  window.midi=midi;
  console.log("tracks:",midi.tracks);

  // ---- 全トラックからノート取得 ----
  let notes=[];
  for(const track of midi.tracks){
    for(const note of track.notes){
      notes.push(note);
    }
  }

  if(notes.length===0){
    output.value="ノートが見つからない";
    return;
  }

  // ---- ソート ----
  notes.sort((a,b)=>a.time-b.time);

  // ---- 入力値取得 ----
  const EPS=parseFloat(epsInput.value)||0.02;
  const LIMIT=parseInt(limitInput.value)||Infinity;

  // ---- 同時音まとめて最高音抽出 ----
  let groups=[];
  let current=[];

  for(const note of notes){
    if(current.length===0){
      current.push(note);
      continue;
    }

    if(Math.abs(note.time-current[0].time)<EPS){
      current.push(note);
    }else{
      groups.push(current);
      current=[note];
    }
  }
  if(current.length)groups.push(current);

  let filtered=[];
  for(const g of groups){
    let best=g[0];
    for(const note of g){
      if(note.midi>best.midi){
        best=note;
      }
    }
    filtered.push(best);
  }

  // ---- 最大音数制限 ----
  filtered=filtered.slice(0,LIMIT);

  // ---- 出力 ----
  let res=[];
  let prevEnd=0;

  for(const note of filtered){
    // 休符処理
    if(note.time>prevEnd){
      let gap=note.time-prevEnd;
      let val=Math.round(gap*4);
      if(val>0){
        res.push(`r:${val}`);
      }
    }

    // 音名（小文字化）
    let name=note.name.toLowerCase();

    // 長さ（最低1保証）
    let val=Math.max(1,Math.round(note.duration*4));

    res.push(`${name}:${val}`);

    prevEnd=note.time+note.duration;
  }

  output.value="[" + res.map(x=>`'${x}'`).join(", ") + "]";
});
</script>

</body>
</html>
